name: PR Build and Test

on:
  pull_request:
    branches: [main]

# Cancel any in-progress runs for the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.18.0'

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.9.0
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v6
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Build
        run: pnpm build

      - name: Run unit tests
        run: pnpm test:coverage

      - name: Run e2e tests
        run: pnpm test:e2e:docker

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
          fail_ci_if_error: false

  # Builds the shipped Dockerfile (the e2e job builds Dockerfile.e2e, so the
  # production image is otherwise never exercised in CI) and verifies it runs
  # unprivileged as uid 1000.
  docker-image:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Build production image
        run: docker build -t actual-auto-sync:ci .

      - name: Verify the image runs as non-root (uid 1000)
        run: |
          uid="$(docker run --rm --entrypoint sh actual-auto-sync:ci -c 'id -u')"
          echo "runtime uid: ${uid}"
          if [ "${uid}" != "1000" ]; then
            echo "::error::expected the container to run as uid 1000, got ${uid}"
            exit 1
          fi
