name: Repository Stats

on:
  workflow_dispatch:
  schedule:
    - cron: '15 12 * * *'

permissions:
  contents: read
  issues: write

jobs:
  update-repo-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update repository stats issue
        run: node .github/scripts/update-repo-stats.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
